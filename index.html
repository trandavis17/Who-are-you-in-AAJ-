<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who are you in AAJ?</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 25%, #a1c4fd 60%, #c2e9fb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      background: #fff;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.13);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #ff6b6b);
      background-size: 200%;
      animation: rainbow 3s linear infinite;
    }
    @keyframes rainbow { 0%{background-position:0%} 100%{background-position:200%} }

    .site-title {
      font-size: 22px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 1.5rem;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #4d96ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .progress-bar {
      flex: 1;
      height: 8px;
      background: #f0f0f0;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #4d96ff);
      background-size: 200%;
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
      animation: rainbow 3s linear infinite;
    }
    .progress-text {
      font-size: 13px;
      font-weight: 700;
      color: #aaa;
      white-space: nowrap;
    }

    .q-text {
      font-size: 20px;
      font-weight: 800;
      color: #222;
      line-height: 1.4;
      margin-bottom: 1.5rem;
      min-height: 60px;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice {
      padding: 14px 18px;
      border: 2.5px solid #eee;
      border-radius: 14px;
      background: #fafafa;
      color: #333;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    .choice:hover { background: #f0f0ff; border-color: #b3aaff; transform: translateX(4px); }
    .choice.selected {
      border-color: #4d96ff;
      background: linear-gradient(135deg, #e0ecff, #f0e8ff);
      color: #2244aa;
      transform: translateX(4px);
    }

    .next-btn {
      margin-top: 1.5rem;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #4d96ff);
      background-size: 200%;
      animation: rainbow 3s linear infinite;
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }
    .next-btn.visible { opacity: 1; pointer-events: all; }
    .next-btn:hover { transform: scale(1.02); }
    .next-btn:active { transform: scale(0.98); }

    /* RESULT */
    #result { display: none; text-align: center; }

    .result-label {
      font-size: 14px;
      font-weight: 800;
      color: #aaa;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .result-photo-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 1.25rem;
    }

    .result-photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 5px solid #fff;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    }

    .result-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d, #4d96ff, #6bcb77);
      background-size: 200%;
      animation: rainbow 2s linear infinite;
      z-index: -1;
    }

    .result-name {
      font-size: 36px;
      font-weight: 900;
      color: #222;
      margin-bottom: 0.3rem;
      animation: popIn 0.4s cubic-bezier(.4,0,.2,1);
    }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .result-subtitle {
      font-size: 15px;
      font-weight: 600;
      color: #888;
      margin-bottom: 1.75rem;
    }

    .score-grid {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    .score-card {
      flex: 1;
      background: #f8f8f8;
      border-radius: 14px;
      padding: 14px 8px;
      text-align: center;
      border: 2px solid #eee;
    }
    .score-card .sname { font-size: 12px; font-weight: 800; color: #aaa; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .score-card .snum { font-size: 26px; font-weight: 900; color: #ccc; }
    .score-card.winner {
      border-color: #4d96ff;
      background: linear-gradient(135deg, #e0ecff, #f0e8ff);
    }
    .score-card.winner .snum { color: #4d96ff; }
    .score-card.winner .sname { color: #7799dd; }

    .retry-btn {
      width: 100%;
      padding: 14px;
      border: 2.5px solid #eee;
      border-radius: 14px;
      background: #fff;
      color: #666;
      font-size: 15px;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .retry-btn:hover { background: #f5f5f5; border-color: #ccc; }

    /* CONFETTI CANVAS */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div class="container">
  <p class="site-title">Who are you in AAJ? ✨</p>

  <div id="quiz">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
      <span class="progress-text" id="q-counter">1 / 5</span>
    </div>
    <p class="q-text" id="q-text"></p>
    <div class="choices" id="choices"></div>
    <button class="next-btn" id="next-btn">Next →</button>
  </div>

  <div id="result">
    <p class="result-label">you are...</p>
    <div class="result-photo-wrap">
      <div class="result-ring"></div>
      <img class="result-photo" id="res-photo" src="" alt="" />
    </div>
    <p class="result-name" id="res-name"></p>
    <p class="result-subtitle" id="res-sub"></p>
    <div class="score-grid" id="score-grid"></div>
    <button class="retry-btn" onclick="restart()">🔄 take it again</button>
  </div>
</div>

const questions = [
  { text: 'Do you randomly say "shibal" in everyday conversation?? 😤', choices: [{ text: 'Yes', person: 'Andy' },{ text: 'No', person: 'Anna' },{ text: 'HELL YESS 🔥', person: 'Jocelyn' }] },
  { text: 'Do you like saying "fuck my big fat chungus life"?? 😭', choices: [{ text: 'Yes 💀', person: 'Andy' },{ text: 'No', person: 'Jocelyn' },{ text: 'HELL YESS', person: 'Anna' }] },
  { text: 'Do you like all day project?? 🎵', choices: [{ text: 'Who??', person: 'Anna' },{ text: 'Sure', person: 'Andy' },{ text: 'HELL YESS 🎉', person: 'Jocelyn' }] },
  { text: 'Do you like going to raves? 🎧', choices: [{ text: 'Yeah.', person: 'Anna' },{ text: 'Sometimes', person: 'Andy' },{ text: 'Maybe 🤔', person: 'Jocelyn' }] },
  { text: 'Do you like drinking? 🍻', choices: [{ text: 'Yeah.', person: 'Anna' },{ text: 'Sometimes', person: 'Andy' },{ text: 'HELL YESS 🥂', person: 'Jocelyn' }] }
];

const personas = {
  Andy:    { sub: 'certified shibal-sayer & chungus life enjoyer 🕶️' },
  Anna:    { sub: 'yeah. that's it. just... yeah. 🍅' },
  Jocelyn: { sub: 'HELL YESS, obviously 💅' }
};

let current = 0, scores = { Andy:0, Anna:0, Jocelyn:0 }, selected = null;

function render() {
  const q = questions[current];
  document.getElementById('q-counter').textContent = (current+1) + ' / ' + questions.length;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress').style.width = (current / questions.length * 100) + '%';
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  selected = null;
  document.getElementById('next-btn').classList.remove('visible');
  q.choices.forEach(function(c, i) {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = c.text;
    btn.onclick = function() { selectChoice(i); };
    choicesEl.appendChild(btn);
  });
  document.getElementById('next-btn').textContent = current < questions.length - 1 ? 'Next →' : 'See my result ✨';
}

function selectChoice(i) {
  selected = i;
  document.querySelectorAll('.choice').forEach(function(el, idx) {
    el.classList.toggle('selected', idx === i);
  });
  document.getElementById('next-btn').classList.add('visible');
}

document.getElementById('next-btn').onclick = function() {
  if (selected === null) return;
  scores[questions[current].choices[selected].person]++;
  current++;
  if (current < questions.length) { render(); }
  else { showResult(); }
};

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const winner = Object.entries(scores).sort(function(a,b){return b[1]-a[1];})[0][0];
  document.getElementById('res-photo').src = PHOTOS[winner];
  document.getElementById('res-photo').alt = winner;
  document.getElementById('res-name').textContent = winner;
  document.getElementById('res-sub').textContent = personas[winner].sub;
  const grid = document.getElementById('score-grid');
  grid.innerHTML = '';
  ['Andy','Anna','Jocelyn'].forEach(function(name) {
    const card = document.createElement('div');
    card.className = 'score-card' + (name === winner ? ' winner' : '');
    card.innerHTML = '<div class="sname">' + name + '</div><div class="snum">' + scores[name] + '</div>';
    grid.appendChild(card);
  });
  launchConfetti();
}

function restart() {
  current = 0; scores = { Andy:0, Anna:0, Jocelyn:0 }; selected = null;
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  render();
}

/* CONFETTI */
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bb5','#b96bff'];
  const pieces = Array.from({length: 160}, function() {
    return {
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      w: 8 + Math.random() * 8,
      h: 4 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      r: Math.random() * Math.PI * 2,
      dr: (Math.random() - 0.5) * 0.2,
      vy: 2 + Math.random() * 4,
      vx: (Math.random() - 0.5) * 2
    };
  });
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(function(p) {
      p.x += p.vx; p.y += p.vy; p.r += p.dr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.r);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (frame < 200) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

render();
